<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4d4d4"/>
      <stop offset="30%" stop-color="#f0f0f0"/>
      <stop offset="50%" stop-color="#a8a8a8"/>
      <stop offset="70%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#b0b0b0"/>
    </linearGradient>
    <linearGradient id="lightSide" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="30%" stop-color="#c8c8c8"/>
      <stop offset="60%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#d0d0d0"/>
    </linearGradient>
    <linearGradient id="darkSide" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#0f1626"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <radialGradient id="sunGold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="40%" stop-color="#ffd700"/>
      <stop offset="80%" stop-color="#daa520"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </radialGradient>
    <linearGradient id="moonGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="50%" stop-color="#c0c0c0"/>
      <stop offset="100%" stop-color="#999"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <clipPath id="mainCircle">
      <circle cx="256" cy="256" r="220"/>
    </clipPath>
  </defs>

  <!-- Outer metallic ring -->
  <circle cx="256" cy="256" r="250" fill="url(#ringGrad)" filter="url(#shadow)"/>
  <circle cx="256" cy="256" r="244" fill="none" stroke="#888" stroke-width="1" opacity="0.4"/>

  <!-- Inner dark border ring -->
  <circle cx="256" cy="256" r="226" fill="#1a1a2e" stroke="#555" stroke-width="2"/>

  <g clip-path="url(#mainCircle)">
    <!-- Full dark background -->
    <circle cx="256" cy="256" r="220" fill="url(#darkSide)"/>

    <!-- Light half (left side) - yin-yang S-curve -->
    <!-- The light side: left half circle + top small bulge into right + bottom concave -->
    <path d="M256,36 A220,220 0 0,0 256,476 A110,110 0 0,1 256,256 A110,110 0 0,0 256,36 Z"
          fill="url(#lightSide)"/>
  </g>

  <!-- === SUN on light side (upper-left) === -->
  <g transform="translate(190, 155)">
    <!-- Outer flame rays (long, wavy) -->
    <g fill="none" stroke="#c8960f" stroke-width="3" stroke-linecap="round" opacity="0.7">
      <path d="M60,60 L60,2" transform="rotate(0,60,60)"/>
      <path d="M60,60 L60,5" transform="rotate(30,60,60)"/>
      <path d="M60,60 L60,2" transform="rotate(60,60,60)"/>
      <path d="M60,60 L60,5" transform="rotate(90,60,60)"/>
      <path d="M60,60 L60,2" transform="rotate(120,60,60)"/>
      <path d="M60,60 L60,5" transform="rotate(150,60,60)"/>
      <path d="M60,60 L60,2" transform="rotate(180,60,60)"/>
      <path d="M60,60 L60,5" transform="rotate(210,60,60)"/>
      <path d="M60,60 L60,2" transform="rotate(240,60,60)"/>
      <path d="M60,60 L60,5" transform="rotate(270,60,60)"/>
      <path d="M60,60 L60,2" transform="rotate(300,60,60)"/>
      <path d="M60,60 L60,5" transform="rotate(330,60,60)"/>
    </g>
    <!-- Inner flame rays (shorter, between main rays) -->
    <g fill="none" stroke="#daa520" stroke-width="2" stroke-linecap="round" opacity="0.55">
      <path d="M60,60 L60,18" transform="rotate(15,60,60)"/>
      <path d="M60,60 L60,18" transform="rotate(45,60,60)"/>
      <path d="M60,60 L60,18" transform="rotate(75,60,60)"/>
      <path d="M60,60 L60,18" transform="rotate(105,60,60)"/>
      <path d="M60,60 L60,18" transform="rotate(135,60,60)"/>
      <path d="M60,60 L60,18" transform="rotate(165,60,60)"/>
      <path d="M60,60 L60,18" transform="rotate(195,60,60)"/>
      <path d="M60,60 L60,18" transform="rotate(225,60,60)"/>
      <path d="M60,60 L60,18" transform="rotate(255,60,60)"/>
      <path d="M60,60 L60,18" transform="rotate(285,60,60)"/>
      <path d="M60,60 L60,18" transform="rotate(315,60,60)"/>
      <path d="M60,60 L60,18" transform="rotate(345,60,60)"/>
    </g>
    <!-- Sun disc -->
    <circle cx="60" cy="60" r="26" fill="url(#sunGold)" stroke="#a07010" stroke-width="1.5"/>
    <circle cx="56" cy="55" r="10" fill="#ffe680" opacity="0.3"/>
  </g>

  <!-- === MOON + STARS on dark side (lower-right) === -->
  <!-- Crescent moon -->
  <g transform="translate(280, 310)">
    <circle cx="40" cy="40" r="28" fill="url(#moonGrad)" stroke="#999" stroke-width="1"/>
    <circle cx="52" cy="32" r="22" fill="url(#darkSide)"/>
  </g>

  <!-- Stars scattered on dark side -->
  <g fill="#c0c0c0">
    <!-- 4-pointed star macro -->
    <polygon points="340,260 342,254 344,260 342,266"/>
    <polygon points="340,260 334,262 340,264 346,262"/>

    <polygon points="390,290 391.5,286 393,290 391.5,294"/>
    <polygon points="390,290 386,291.5 390,293 394,291.5"/>

    <polygon points="420,340 421,337 422,340 421,343"/>
    <polygon points="420,340 417,341 420,342 423,341"/>

    <polygon points="350,380 351.5,376 353,380 351.5,384"/>
    <polygon points="350,380 346,381.5 350,383 354,381.5"/>

    <polygon points="410,400 411,398 412,400 411,402"/>
    <polygon points="410,400 408,401 410,402 412,401"/>

    <polygon points="370,320 371,318 372,320 371,322"/>
    <polygon points="370,320 368,321 370,322 372,321"/>

    <polygon points="300,370 301,367 302,370 301,373"/>
    <polygon points="300,370 297,371 300,372 303,371"/>
  </g>

  <!-- Outer polish ring -->
  <circle cx="256" cy="256" r="242" fill="none" stroke="url(#ringGrad)" stroke-width="5"/>
</svg>
